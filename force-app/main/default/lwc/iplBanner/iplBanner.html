<template>
    <main class="banner-background">
        <header>
            <h1>IPL T20 DASHBOARD</h1>
        </header>
        <section class="slds-grid slds-wrap">
            <div class="slds-col slds-size_3-of-12">
                Left Stats
            </div>
            <div class="slds-col slds-size_6-of-12">

                <lightning-carousel>
                    <template for:each={carouselList} for:item="item">

                    </lightning-carousel-image>
                    </template>         
                </lightning-carousel>
                
            </div>
            <div class="slds-col slds-size_3-of-12">
                Right Stats
            </div>
            
        </section>
